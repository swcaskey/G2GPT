<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>G2GPT - Dashboard</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <div class="brand-block">
        <span class="brand-name">G2GPT</span>
      </div>
    </header>

    <main class="dashboard-main">
      <section class="dashboard-card" aria-labelledby="dashboard-title">
        <div class="dashboard-content">
          <div class="dashboard-top">
            <h1 id="dashboard-title">Authenticated Home Page</h1>
            <a href="/logout" class="btn logout-link" id="logout-link">Log Out</a>
          </div>

          <div class="workspace-shell">
            <aside class="sidebar-panel" aria-label="Conversation history">
              <div class="sidebar-top">
                <button id="new-chat-btn" class="btn sidebar-btn" type="button">
                  + New Conversation
                </button>

                <label class="sr-only" for="search-input">Search conversations</label>
                <input
                  type="text"
                  id="search-input"
                  class="search-input"
                  placeholder="Search conversations..."
                />
              </div>

              <div id="history-list" class="history-list"></div>

              <div class="sidebar-footer">G2GPT · Conversation History</div>
            </aside>

            <section class="chat-panel" aria-label="Chat workspace">
              <div class="chat-header">
                <h2 id="chat-title" class="chat-title">New Conversation</h2>
              </div>

              <div id="messages" class="messages">
                <div id="empty-state" class="empty-state">
                  <div class="empty-badge">AI</div>
                  <h3 class="empty-title">Welcome to G2GPT</h3>
                  <p class="empty-sub">
                    Start a new conversation or select one from the sidebar.
                  </p>
                </div>
              </div>

              <div
                id="typing-indicator"
                class="typing-indicator"
                aria-live="polite"
                aria-hidden="true"
              >
                <div class="msg-row bot typing-row">
                  <div class="avatar bot">AI</div>
                  <div class="typing-bubble">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                  </div>
                </div>
              </div>

              <div class="input-area">
                <!-- Model Selector Dropdown -->
                <div class="model-selector-section" id="model-selector-section">
                  <button class="model-dropdown-btn" id="model-dropdown-btn" aria-label="Select models" aria-haspopup="listbox">
                    <span class="model-dropdown-label">Models</span>
                    <span class="model-dropdown-icon">▼</span>
                  </button>
                  <div class="model-dropdown-content" id="model-dropdown-content" role="listbox" hidden>
                    <div class="model-list" id="model-list"></div>
                  </div>
                </div>

                <div class="input-row" id="input-row">
                  <label class="sr-only" for="user-input">Type your message</label>
                  <textarea
                    id="user-input"
                    rows="1"
                    placeholder="Type your message..."
                  ></textarea>

                  <button
                    id="send-btn"
                    class="send-btn"
                    type="button"
                    aria-label="Send message"
                    title="Send"
                  >
                    <svg
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2.2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      aria-hidden="true"
                    >
                      <line x1="22" y1="2" x2="11" y2="13"></line>
                      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                  </button>
                </div>

                <p class="input-hint">
                  Press Enter to send · Shift+Enter for a new line
                </p>
              </div>
            </section>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>
