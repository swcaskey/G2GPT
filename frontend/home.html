<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>G2GPT - Home</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      border: 5px solid black;
      border-radius: 15px;
      width: 500px;
      background: white;
    }

    .title {
      text-align: center;
      border-bottom: 2px solid black;
      padding: 10px;
      margin: 0;
    }

    .content {
      padding: 20px;
    }

    .description-line {
      width: 200px;
      height: 2px;
      background: black;
      margin-top: 5px;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: flex-start;
    }

    .btn {
      text-decoration: none;
      padding: 8px 16px;
      background: yellow;
      border: 2px solid black;
      border-radius: 6px;
      color: black;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      background: gold;
    }
  </style>

</head>



<body>

  <div class="container">
    <h1 class="title">Landing Page</h1>

    <div class="content">
      <p><strong>App Name:</strong> 626GPT</p>

      <p><strong>Description:</strong></p>
      <div class="description-line"></div>

      <div class="buttons">
        <a href="/signup" class="btn" id="signup-link">Sign Up</a>
        <a href="/login" class="btn" id="login-link">Log In</a>
      </div>
    </div>
  </div>

</body>
</html>
