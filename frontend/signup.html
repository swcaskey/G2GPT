<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>G2GPT - Sign Up</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/signup.css" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <div class="brand-block">
        <span class="brand-name">G2GPT</span>
      </div>
    </header>

    <main class="signup-main">
      <section class="signup-card" aria-labelledby="signup-title">
        <div class="signup-content">
          <h1 id="signup-title">Create Account</h1>
          <p class="signup-description">
            Create your account to access the G2GPT interface.
          </p>

          <form id="signupForm" class="signup-form" novalidate>
            <div class="form-group">
              <label for="signupEmail">Email</label>
              <input
                type="email"
                id="signupEmail"
                name="email"
                placeholder="Enter your email"
                required
              />
            </div>

            <div class="form-group">
              <label for="signupPassword">Password</label>
              <input
                type="password"
                id="signupPassword"
                name="password"
                placeholder="Enter a password"
                required
              />
            </div>

            <div class="form-group">
              <label for="signupConfirmPassword">Confirm Password</label>
              <input
                type="password"
                id="signupConfirmPassword"
                name="confirmPassword"
                placeholder="Re-enter your password"
                required
              />
            </div>

            <p id="signupMessage" class="message" aria-live="polite"></p>

            <button type="submit" class="btn" id="create-account-btn">
              Create Account
            </button>
          </form>

          <p class="form-footer">
            Already have an account?
            <a href="/login" id="login-link">Log In</a>
          </p>
        </div>
      </section>
    </main>
  </div>

  <script src="js/signup.js"></script>
</body>
</html>
