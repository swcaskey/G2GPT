<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account</title>
  <style>
    * {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #cc0033, #7a001f);
  min-height: 100vh;
}

.page-shell {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.card {
  background: white;
  border-radius: 16px;
  box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
  width: 100%;
  max-width: 520px;
  padding: 32px;
}

.hero-card {
  text-align: center;
}

.form-card h2,
.dashboard-card h2 {
  margin-top: 0;
}

input,
textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0 14px;
  border: 1px solid #d1d5db;
  border-radius: 10px;
  font-size: 15px;
}

textarea {
  resize: vertical;
}

.btn {
  display: inline-block;
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #cc0033;
  color: white;
  font-size: 15px;
  cursor: pointer;
  text-decoration: none;
  text-align: center;
  margin-top: 8px;
}

.btn:hover {
  background: #a8002a;
}

.btn.secondary {
  background: #4b5563;
}

.btn.secondary:hover {
  background: #374151;
}

.button-row {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}

.button-row .btn {
  width: 100%;
}

.message {
  min-height: 24px;
  font-weight: bold;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}

.top-bar .btn {
  width: auto;
  padding: 10px 16px;
  margin-top: 0;
}

.response-box {
  margin-top: 20px;
  padding: 16px;
  background: #f3f4f6;
  border-radius: 12px;
}

a {
  display: inline-block;
  margin-top: 16px;
  color: #cc0033;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="card form-card">
      <h2>Create Account</h2>
      <form id="signupForm">
        <input type="text" id="signupUsername" placeholder="Username" required />
        <input type="password" id="signupPassword" placeholder="Password" required />
        <button type="submit" class="btn">Sign Up</button>
      </form>
      <p id="signupMessage" class="message"></p>
      <a href="index.html">Back to Landing Page</a>
    </div>
  </div>
  <script>
    // Signup
const signupForm = document.getElementById("signupForm");
if (signupForm) {
  signupForm.addEventListener("submit", async (event) => {
    event.preventDefault();

    const username = document.getElementById("signupUsername").value.trim();
    const password = document.getElementById("signupPassword").value.trim();
    const message = document.getElementById("signupMessage");

    const response = await fetch("/signup", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username, password })
    });

    const data = await response.json();
    message.textContent = data.message;
    message.style.color = data.success ? "green" : "red";
  });
}

// Login
const loginForm = document.getElementById("loginForm");
if (loginForm) {
  loginForm.addEventListener("submit", async (event) => {
    event.preventDefault();

    const username = document.getElementById("loginUsername").value.trim();
    const password = document.getElementById("loginPassword").value.trim();
    const message = document.getElementById("loginMessage");

    const response = await fetch("/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username, password })
    });

    const data = await response.json();
    message.textContent = data.message;
    message.style.color = data.success ? "green" : "red";

    if (data.success) {
      localStorage.setItem("loggedInUser", data.username);
      window.location.href = "dashboard.html";
    }
  });
}

// CAS placeholder
const casBtn = document.getElementById("casBtn");
if (casBtn) {
  casBtn.addEventListener("click", async () => {
    const message = document.getElementById("loginMessage");

    const response = await fetch("/auth/cas");
    const data = await response.json();

    message.textContent = data.message;
    message.style.color = "red";
  });
}

// Dashboard welcome
const welcomeText = document.getElementById("welcomeText");
if (welcomeText) {
  const user = localStorage.getItem("loggedInUser");
  welcomeText.textContent = user
    ? `Welcome, ${user}`
    : "Welcome";
}

// Inference
const inferenceForm = document.getElementById("inferenceForm");
if (inferenceForm) {
  inferenceForm.addEventListener("submit", async (event) => {
    event.preventDefault();

    const prompt = document.getElementById("promptInput").value.trim();
    const output = document.getElementById("inferenceOutput");

    const response = await fetch("/inference", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await response.json();
    output.textContent = data.success ? data.response : data.message;
  });
}

// Logout
const logoutBtn = document.getElementById("logoutBtn");
if (logoutBtn) {
  logoutBtn.addEventListener("click", async () => {
    await fetch("/logout", { method: "POST" });
    localStorage.removeItem("loggedInUser");
    window.location.href = "login.html";
  });
}
  </script>
</body>
</html>
