<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #cc0033, #7a0b1f);
      min-height: 100vh;
    }

    .page-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
      width: 100%;
      max-width: 520px;
      padding: 32px;
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 16px;
    }

    .logo {
      width: 90px;
      height: auto;
    }

    h2 {
      margin: 0 0 20px 0;
      text-align: center;
      color: #111827;
    }

    p.subtitle {
      text-align: center;
      color: #4b5563;
      margin-top: 0;
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #111827;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
    }

    input:focus {
      outline: none;
      border-color: #cc0033;
      box-shadow: 0 0 0 2px rgba(204, 0, 51, 0.2);
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #cc0033;
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s ease;
      margin-top: 6px;
    }

    .btn:hover {
      background: #a8002a;
    }

    .message {
      min-height: 24px;
      font-weight: bold;
      text-align: center;
      margin-top: 14px;
    }

    .message.success {
      color: green;
    }

    .message.error {
      color: red;
    }

    .bottom-row {
      margin-top: 18px;
      text-align: center;
    }

    .bottom-row a {
      color: #cc0033;
      text-decoration: none;
      font-weight: bold;
    }

    .bottom-row a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="card">
      <div class="logo-wrap">
        <img src="Images/rutgers_logo.png" alt="Rutgers Logo" class="logo" />
      </div>

      <h2>Create Account</h2>
      <p class="subtitle">Create a new account for the Rutgers LLM interface.</p>

      <form id="signupForm">
        <label for="signupUsername">Username (NetID)</label>
        <input
          type="text"
          id="signupUsername"
          name="signupUsername"
          placeholder="Enter Username"
          required
        />

        <label for="signupPassword">Password</label>
        <input
          type="password"
          id="signupPassword"
          name="signupPassword"
          placeholder="Enter Password"
          required
        />

        <button type="submit" class="btn">Create Account</button>
      </form>

      <p id="signupMessage" class="message"></p>

      <div class="bottom-row">
        <a href="login.html">Back to Login</a>
      </div>
    </div>
  </div>

  <script>
    const signupForm = document.getElementById("signupForm");
    const signupMessage = document.getElementById("signupMessage");

    signupForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const username = document.getElementById("signupUsername").value.trim();
      const password = document.getElementById("signupPassword").value.trim();

      signupMessage.textContent = "";
      signupMessage.className = "message";

      if (!username || !password) {
        signupMessage.textContent = "Please fill in all fields.";
        signupMessage.classList.add("error");
        return;
      }

      try {
        const response = await fetch("/signup", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        signupMessage.textContent = data.message;

        if (response.ok) {
          signupMessage.classList.add("success");
          signupForm.reset();
        } else {
          signupMessage.classList.add("error");
        }
      } catch (error) {
        signupMessage.textContent = "Could not connect to server.";
        signupMessage.classList.add("error");
        console.error(error);
      }
    });
  </script>
</body>
</html>
