<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log Out</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 32px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        button { padding: 10px 20px; margin: 10px; cursor: pointer; border: 1px solid #ccc; border-radius: 6px; background: #eee; }
        #confirm-yes { background: #cc0033; color: white; border: none; }
        #confirm-yes:hover { background: #990026; }
        .automated-highlight { border-color: #ffc107 !important; outline: 8px solid rgba(255, 193, 7, 0.9) !important; box-shadow: 0 0 25px rgba(255, 193, 7, 1) !important; z-index: 9999; position: relative; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Confirm Log Out</h2>
        <p>Are you sure you want to log out?</p>
        <form action="/" method="GET">
            <button type="submit" id="confirm-yes">Yes, Log Out</button>
            <button type="button" onclick="window.location.href='/dashboard'">No, Stay</button>
        </form>
    </div>
</body>
</html>
